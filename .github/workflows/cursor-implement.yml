name: cursor-implement
on:
  issues:
    types: [labeled]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: cursor-impl-${{ github.event.issue.number }}
  cancel-in-progress: true
jobs:
  implement:
    if: github.event.label.name == 'ready-for-cursor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
      - name: Create work branch
        run: git switch -c "issue-${{ github.event.issue.number }}-cursor"
      - name: Implement the issue
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          cursor-agent -p --force --trust --output-format text "Implement GitHub issue #${ISSUE_NUMBER} (${ISSUE_TITLE}) in THIS repository, working in the current directory. Make the edits on disk and run the build/tests yourself — do NOT just describe or simulate; the working tree must actually contain the changes when you finish. All paths in the brief are repo-relative. Obey .cursor/rules strictly: data changes go through data/*.json; engine/UI code is hand-edited directly in dist/kitchen_app.html outside the /*@DATA@*/ markers; rebuild via python3 src/build.py; re-pin any moved numbers in test/test.js; keep builder/ isolated. Do NOT git commit — the workflow commits. Task brief follows:

          ${ISSUE_BODY}"
      - name: Rebuild artifact + regression (informational)
        continue-on-error: true
        run: |
          python3 src/build.py
          (cd test && node test.js)
          npm install --no-save --no-package-lock jsdom && npm run test:ui
      - name: Guard — fail loudly if the agent made no changes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            gh issue comment ${{ github.event.issue.number }} --body "⚠️ cursor-agent produced no file changes (headless no-op) — no PR opened. See the run logs."
            echo "::error::cursor-agent made no changes — failing so the no-op is visible"
            exit 1
          fi
      - name: Commit, push, open PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          git config user.name "cursor-agent"
          git config user.email "agent@cursor.com"
          git add -A
          git commit -m "Implement #${{ github.event.issue.number }} via cursor-agent"
          git push -u origin HEAD
          gh pr create --base main --fill \
            --body "Implements #${{ github.event.issue.number }} via cursor-agent (triggered by the ready-for-cursor label).

          Plan lives in the issue. CI + the Claude reviewer/tester stations gate this PR before merge."
